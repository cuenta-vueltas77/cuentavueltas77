<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba Navbar Final</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #000;
    color: #fff;
    position: relative;
  }

  .logo-nombre {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    height: 50px;
  }

  .navbar h1 {
    font-size: 24px;
    margin: 0;
  }

  nav {
    display: flex;
  }

  nav ul {
    display: flex;
    list-style: none;
    gap: 20px;
    margin: 0;
    padding: 0;
  }

  nav ul li a {
    color: #fff;
    text-decoration: none;
    padding: 8px 12px;
    display: block;
  }

  /* Botón hamburguesa */
  .menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
    background: #e60000;
    padding: 6px 12px;
    border-radius: 5px;
  }

  /* 📱 Estilos móviles */
  @media (max-width: 600px) {
    .menu-toggle {
      display: block;
      margin-left: auto;
    }

    nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: #000;
      flex-direction: column;
      border-top: 2px solid #e60000;
    }

    nav.mostrar {
      display: flex;
      flex-direction: column;
    }

    nav ul {
      flex-direction: column;
      width: 100%;
    }

    nav ul li {
      width: 100%;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    nav ul li a {
      width: 100%;
    }
  }
</style>
</head>
<body>

<header class="navbar">
  <div class="logo-nombre">
    <img src="logo-cuenta-vueltas.png" alt="Logo" class="logo">
    <h1>Cuenta Vueltas 77</h1>
  </div>
  <div class="menu-toggle" id="menu-toggle">&#9776;</div>
  <nav id="menu">
    <ul>
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Noticias</a></li>
      <li><a href="#">Pilotos</a></li>
      <li><a href="#">Historias</a></li>
      <li><a href="#">Categorías</a></li>
    </ul>
  </nav>
</header>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const menuToggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');

    menuToggle.addEventListener('click', () => {
      menu.classList.toggle('mostrar');
    });
  });
</script>

</body>
</html>
